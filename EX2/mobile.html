<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mobiles - Vetri online cart</title>
    <style>
        body {
            background-color: lightblue;
            font-family: "Times New Roman", Times, serif;
            padding: 20px;
        }
        
        .phone-box {
            background-color: white;
            border: 3px solid black;
            padding: 20px;
            margin: 20px auto;
            width: 400px;
            text-align: center;
            border-radius: 8px;
        }
        .phone-box img {
            margin-bottom: 15px;
        }
        .audio-container {
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

   
    <a href="index.html" >Back to Home</a>

    <h1 align="center">Mobile Store</h1>
    <hr>

   
    <div class="audio-container">
        <h3>Listen to our Mobile Offers:</h3>
        <audio controls>
            <source src="promo.mp3" type="audio/mpeg">
           
        </audio>
    </div>

    <hr>


    <div class="phone-box">
        <h2>Poco X8 Pro Max</h2>
     
        <img src="phone1.jpg" width="250" height="300" alt="Phone A">
        
        <h3>Video Review:</h3>
       
        <video width="320" height="240" controls>
            <source src="review1.mp4" type="video/mp4">
        
        </video>
    </div>

   
    <div class="phone-box">
        <h2>Samsung Galaxy M56 5G
</h2>
        
        <img src="phone2.jpg" width="250" height="300" alt="Phone B">
        
        <h3>Video Review:</h3>
 
        <video width="320" height="240" controls>
            <source src="review2.mp4" type="video/mp4">
          
        </video>
    </div>
    
    <hr>

    <h2>GUIDELINE:</h2>
    <ol>
        <li><b>Here we sell electronic gadgets and food related items</b></li>
        <li><b>Be careful while payment</b></li>
    </ol>
    <hr>

</body>
</html>
